ai:
  provider: siliconflow
  base_url: https://api.siliconflow.cn/v1/chat/completions
  api_key_env: SILICONFLOW_API_KEY
  model: deepseek-ai/DeepSeek-V4-Pro
  temperature: 0.4
  max_tokens: 160
  request_timeout_seconds: 60
  thinking_budget: 32
  observer_max_tokens: 220
  observer_thinking_budget: 16
  observer_full_max_tokens: 320
  observer_full_thinking_budget: 24
  dynamic_structure_cost_tier: medium
  protagonist_budget_per_week: 1
  active_character_budget_per_week: 0
  chronicler_budget_per_week: 2
  observation_budget_mode: on_demand
