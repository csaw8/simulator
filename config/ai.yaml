ai:
  provider: deepseek
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  model: deepseek-v4-pro
  temperature: 0.4
  max_tokens: 512
  request_timeout_seconds: 60
  thinking_budget: 32
  thinking_mode: disabled
  reasoning_effort: high
  low_cost_max_tokens: 256
  low_cost_thinking_budget: 8
  medium_cost_max_tokens: 512
  medium_cost_thinking_budget: 16
  high_cost_max_tokens: 1024
  high_cost_thinking_budget: 24
  observer_max_tokens: 320
  observer_thinking_budget: 16
  observer_full_max_tokens: 512
  observer_full_thinking_budget: 24
  dynamic_structure_cost_tier: medium
  emergent_presence_cost_tier: high
  protagonist_budget_per_week: 1
  active_character_budget_per_week: 0
  chronicler_budget_per_week: 2
  observation_budget_mode: on_demand
